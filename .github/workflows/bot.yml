name: Polymarket Bot

on:
  schedule:
    # Arranca cada 4 horas → cobertura 24/7 sin gaps
    - cron: "0 0,4,8,12,16,20 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 6 horas (el bot se detiene solo a las 5h)

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create logs directory
        run: mkdir -p logs

      - name: Run bot (proceso continuo ~5h)
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          CLOB_API_KEY: ${{ secrets.CLOB_API_KEY }}
          CLOB_API_SECRET: ${{ secrets.CLOB_API_SECRET }}
          CLOB_API_PASSPHRASE: ${{ secrets.CLOB_API_PASSPHRASE }}
          MAX_BET_USDC: ${{ vars.MAX_BET_USDC || '5.0' }}
          MIN_CONFIDENCE: ${{ vars.MIN_CONFIDENCE || '0.65' }}
          DRY_RUN: ${{ vars.DRY_RUN || 'true' }}
          STRATEGY: ${{ vars.STRATEGY || 'SAFE_BET' }}
          THRESHOLD_BUY_YES: ${{ vars.THRESHOLD_BUY_YES || '0.30' }}
          THRESHOLD_BUY_NO: ${{ vars.THRESHOLD_BUY_NO || '0.30' }}
          SAFE_BET_MIN: ${{ vars.SAFE_BET_MIN || '0.78' }}
          SAFE_BET_MAX: ${{ vars.SAFE_BET_MAX || '0.92' }}
        run: python bot.py

      - name: Guardar posiciones en el repo
        if: always()
        run: |
          git config user.name "polymarket-bot"
          git config user.email "bot@polymarket"
          git add positions.json || true
          git diff --cached --quiet || git commit -m "chore: update positions [skip ci]"
          git push || true

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-logs-${{ github.run_number }}
          path: logs/
          retention-days: 7
